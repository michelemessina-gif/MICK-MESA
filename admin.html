<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mick Mesa | Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="section">
    <div class="container narrow">

      <p class="section-tag">Admin</p>
<h1>Contact Messages</h1>

<button id="logout-btn" class="btn btn-accent">
  Logout
</button>

<div class="dashboard-stats">
  <article class="stat-card">
    <p>Total Messages</p>
    <h2 id="messages-count">0</h2>
  </article>

  <article class="stat-card">
    <p>Total Subscribers</p>
    <h2 id="subscribers-count">0</h2>
  </article>
</div>


<div id="messages-list"></div>

<hr class="admin-divider">

      <p class="section-tag">Newsletter</p>
      <h2>Subscribers</h2>

      <div id="subscribers-list"></div>

    </div>
  </main>

  <script src="admin.js"></script>
</body>
</html>
